name: Dashboard integration check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_URL: http://localhost:3000
      AUTH_SECRET: ci-only-auth-secret-not-for-production-use
      BOOKING_HOLD_DURATION_MINUTES: 8
      BUSINESS_TIME_ZONE: Europe/Istanbul
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/berfinakbas?schema=public
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run diagnostics
        id: diagnostics
        shell: bash
        run: |
          set +e
          pnpm lint > lint-output.txt 2>&1
          lint_status=$?
          pnpm typecheck > typecheck-output.txt 2>&1
          typecheck_status=$?

          echo "lint_status=$lint_status" >> "$GITHUB_OUTPUT"
          echo "typecheck_status=$typecheck_status" >> "$GITHUB_OUTPUT"

          {
            echo "Dashboard integration diagnostics"
            echo
            echo "===== LINT ====="
            cat lint-output.txt
            echo
            echo "===== TYPECHECK ====="
            cat typecheck-output.txt
          } > diagnostics.txt

          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-diagnostics
          path: diagnostics.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail on diagnostics
        if: steps.diagnostics.outputs.lint_status != '0' || steps.diagnostics.outputs.typecheck_status != '0'
        run: exit 1
