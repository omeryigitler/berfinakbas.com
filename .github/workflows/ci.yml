name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_URL: http://localhost:3000
      AUTH_SECRET: ci-only-auth-secret-not-for-production-use
      BOOKING_HOLD_DURATION_MINUTES: "8"
      BUSINESS_TIME_ZONE: Europe/Istanbul
      DATABASE_URL: ${{ format('postgresql://postgres:{0}@localhost:5432/berfinakbas?schema=public', 'postgres') }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          exit $status

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 1

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Production-build smoke
        run: pnpm test:smoke

  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_URL: http://localhost:3000
      AUTH_SECRET: ci-only-auth-secret-not-for-production-use
      BOOKING_HOLD_DURATION_MINUTES: "8"
      BUSINESS_TIME_ZONE: Europe/Istanbul
      DATABASE_URL: ${{ format('postgresql://postgres:{0}@localhost:5432/berfinakbas_integration?schema=public', 'postgres') }}
      NEXT_TELEMETRY_DISABLED: "1"
      TEST_DATABASE_URL: ${{ format('postgresql://postgres:{0}@localhost:5432/berfinakbas_integration?schema=public', 'postgres') }}

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: berfinakbas_integration
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d berfinakbas_integration"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run PostgreSQL integration tests
        run: pnpm test:integration
